{% extends 'structure/base.html' %}

{% block title %}Gestión de Donaciones | Clínica de Juguetes{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='styles/home.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='styles/donacion.css') }}">
{% endblock %}

{% block content %}
<main class="gestion-donacion">
    <h2>Deja tu Juguete Aquí</h2>

    <form class="form-donacion" action="{{ url_for('donacion') }}" method="POST">
        <label for="tipo_donacion">Tipo de donación:</label>
        <select id="tipo_donacion" name="tipo_donacion" required onchange="mostrarOpciones()">
            <option value="">Selecciona una opción</option>
            <option value="carros" {% if datos.get('tipo_donacion') == 'carros' %}selected{% endif %}>Carros</option>
            <option value="munecas" {% if datos.get('tipo_donacion') == 'munecas' %}selected{% endif %}>Muñecas</option>
            <option value="balones" {% if datos.get('tipo_donacion') == 'balones' %}selected{% endif %}>Balones</option>
            <option value="otros" {% if datos.get('tipo_donacion') == 'otros' %}selected{% endif %}>Otros</option>
        </select>

        <div id="opcion-carros" style="display:none;">
            <label for="categoria_carros">Categoría de carros:</label>
            <select id="categoria_carros" name="categoria_carros">
                <option value="">Selecciona una categoría</option>
                <option value="hotwheels">Hot Wheels</option>
                <option value="camiones">Camiones</option>
                <option value="vehiculos_control_remoto">Vehículos a control remoto</option>
                <option value="otros_carros">Otros</option>
            </select>
        </div>

        <div id="opcion-munecas" style="display:none;">
            <label for="categoria_munecas">Categoría de muñecas:</label>
            <select id="categoria_munecas" name="categoria_munecas">
                <option value="">Selecciona una categoría</option>
                <option value="bebe">Bebé</option>
                <option value="muneca">Muñeca</option>
                <option value="peluches">Peluches</option>
                <option value="otros_munecas">Otros</option>
            </select>
        </div>

        <div id="opcion-balones" style="display:none;">
            <label for="categoria_balones">Categoría de balones:</label>
            <select id="categoria_balones" name="categoria_balones">
                <option value="">Selecciona una categoría</option>
                <option value="futbol">Fútbol</option>
                <option value="baloncesto">Baloncesto</option>
                <option value="voleibol">Voleibol</option>
                <option value="inflables">Inflables</option>
            </select>
        </div>

        <div id="opcion-otros" style="display:none;">
            <label for="categoria_otros">Categoría de otros:</label>
            <select id="categoria_otros" name="categoria_otros">
                <option value="">Selecciona una categoría</option>
                <option value="peluches">Peluches</option>
                <option value="juegos_de_mesa">Juegos de mesa</option>
                <option value="vehiculos">Vehículos</option>
                <option value="otros">Otros</option>
            </select>
        </div>

        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion"
                  name="descripcion"
                  rows="3"
                  required
                  minlength="5">{{ datos.get('descripcion', '') }}</textarea>

        <label for="beneficiario_id">Beneficiario:</label>
        <select id="beneficiario_id" name="beneficiario_id" required>
            <option value="">Selecciona un beneficiario</option>
            {% for b in beneficiarios %}
                <option value="{{ b.Cedula }}"
                    {% if datos.get('beneficiario_id') == b.Cedula|string %}selected{% endif %}>
                    {{ b.Cedula }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" class="btn-donar">Donar</button>
    </form>
</main>
{% endblock %}

{% block scripts %}
<script>
function mostrarOpciones() {
    const tipo = document.getElementById('tipo_donacion').value;

    document.getElementById('opcion-carros').style.display = tipo === 'carros' ? 'block' : 'none';
    document.getElementById('opcion-munecas').style.display = tipo === 'munecas' ? 'block' : 'none';
    document.getElementById('opcion-balones').style.display = tipo === 'balones' ? 'block' : 'none';
    document.getElementById('opcion-otros').style.display = tipo === 'otros' ? 'block' : 'none';
}

document.addEventListener('DOMContentLoaded', mostrarOpciones);
</script>
{% endblock %}
